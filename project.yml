name: Switch
options:
  bundleIdPrefix: com.sanyamgarg
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: "WCAFS55H9G"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    "CODE_SIGN_IDENTITY[sdk=macosx*]": "Developer ID Application"
targets:
  Switch:
    type: application
    platform: macOS
    sources:
      - path: Sources/Switch
    settings:
      base:
        PRODUCT_NAME: Switch
        PRODUCT_BUNDLE_IDENTIFIER: com.sanyamgarg.switch
        INFOPLIST_FILE: Sources/Switch/Resources/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: Sources/Switch/Resources/Switch.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
